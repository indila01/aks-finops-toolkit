apiVersion: v2
name: aks-finops-toolkit
description: |
  AKS FinOps Toolkit - Automated cost visibility and rightsizing for Azure Kubernetes Service.
  Bundles Prometheus, Grafana, VPA, and Alertmanager with pre-built cost dashboards and alerts.
type: application
version: 0.1.0
appVersion: "1.0.0"

maintainers:
  - name: Your Name
    url: https://github.com/your-username

keywords:
  - finops
  - kubernetes
  - aks
  - prometheus
  - grafana
  - cost
  - rightsizing

dependencies:
  - name: kube-prometheus-stack
    version: "57.2.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled

  - name: vpa
    version: "4.4.6"
    repository: https://charts.fairwinds.com/stable
    condition: vpa.enabled
