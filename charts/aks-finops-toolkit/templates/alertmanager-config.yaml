{{/*
  GAP-07 fix: Alertmanager configuration as a Helm-templated Secret.
  This overrides the kube-prometheus-stack sub-chart's Alertmanager config
  so that the Slack webhook URL is injected at install time via --set or values file.

  The Secret is named to match the alertmanager selector used by the Prometheus Operator.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-{{ .Release.Name }}-kube-prometheus-stack-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aks-finops-toolkit.labels" . | nindent 4 }}
type: Opaque
stringData:
  alertmanager.yaml: |-
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 6h
      receiver: "slack-notifications"
      routes:
        - matchers:
            - name: severity
              value: warning
          receiver: "slack-notifications"
        - matchers:
            - name: severity
              value: critical
          receiver: "slack-notifications"

    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url: {{ required "alertmanager.slack.webhookUrl is required. Pass it with --set alertmanager.slack.webhookUrl=https://hooks.slack.com/..." .Values.alertmanager.slack.webhookUrl | quote }}
            channel: {{ .Values.alertmanager.slack.channel | quote }}
            username: {{ .Values.alertmanager.slack.username | quote }}
            icon_emoji: ":money_with_wings:"
            send_resolved: true
            title: |-
              [{{ "{{" }} .Status | toUpper {{ "}}" }}{{ "{{" }} if eq .Status "firing" {{ "}}" }}:{{ "{{" }} .Alerts.Firing | len {{ "}}" }}{{ "{{" }} end {{ "}}" }}] {{ "{{" }} .CommonLabels.alertname {{ "}}" }}
            text: |-
              {{ "{{" }} range .Alerts {{ "}}" }}
              *Alert:* {{ "{{" }} .Annotations.summary {{ "}}" }}
              *Namespace:* {{ "{{" }} .Labels.namespace {{ "}}" }}
              *Details:* {{ "{{" }} .Annotations.description {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}

    inhibit_rules:
      - source_matchers:
          - name: severity
            value: critical
        target_matchers:
          - name: severity
            value: warning
        equal: ["alertname", "namespace"]
